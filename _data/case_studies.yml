  - id: "everest-retail-web-transformation"
    client: "Everest Retail"
    industry: "E-Commerce / Retail"
    service: "Web & Product + Data & Analytics"
    title: "Digital Experience Overhaul That Drove 220% Conversion Growth"
    short_description: "Complete replatforming and UX redesign that transformed an e-commerce giant's digital presence."
    challenge: >
      Everest Retail's legacy e-commerce platform was crumbling under the 
      weight of 10M+ monthly visitors. Page load times exceeded 8 seconds, 
      mobile conversion was below 1%, and their analytics infrastructure 
      couldn't provide real-time visibility into customer behavior.
    solution: >
      We executed a comprehensive digital transformation:
      
      1. Platform Migration: Moved from their legacy monolith to a headless 
      commerce architecture, achieving sub-second page loads and 99.99% uptime.
      
      2. UX Redesign: Completely reimagined the shopping experience with 
      personalized product discovery, streamlined checkout (reduced from 
      6 steps to 2), and AI-powered recommendations.
      
      3. Analytics Hub: Built a real-time analytics platform unifying data 
      from 25+ sources, providing instant visibility into every customer 
      interaction and enabling predictive inventory management.
    results:
      - metric: "40%"
        label: "Page load time reduction (LCP <1.5s)"
      - metric: "220%"
        label: "Conversion rate increase"
      - metric: "185%"
        label: "Mobile traffic growth"
      - metric: "95%"
        label: "Checkout completion rate"
      - metric: "35%"
        label: "Average order value increase"
    image: "/assets/images/case-studies/everest-hero.jpg"
    testimonial: >
      "The team at Apex rebuilt our entire digital presence in 90 days. The 
      results were staggering — they set a new bar for what we thought was possible."
    testimonial_author: "Jennifer Wu, VP Digital"
    results_image: "/assets/images/case-studies/everest-results.jpg"
    tags: ["web-product", "data-analytics"]
    featured: true
    order: 3

  - id: "novatech-b2b-growth-engine"
    client: "NovaTech Solutions"
    industry: "B2B SaaS"
    service: "Growth Strategy + Digital Marketing"
    title: "B2B Growth Engine That Delivered 12:1 ROAS in 6 Months"
    short_description: "Data-driven B2B growth strategy that transformed a niche SaaS player into a category leader."
    challenge: >
      NovaTech had an exceptional B2B SaaS product but was lost in a sea of 
      competitors. Their sales cycle was long (6-9 months), their content was 
      generic, and they had no systematic approach to demand generation. 
      Marketing and sales operated in silos with no shared metrics.
    solution: >
      We built a unified growth engine:
      
      1. ICP & Segmentation: Deep-dive analysis identified 3 high-value 
      segments. Created personalized campaigns for each with tailored messaging.
      
      2. Content-Led Demand Gen: Launched an aggressive content program — 
      original research reports, interactive ROI calculators, and executive 
      briefing series. Repurposed across 12 channels.
      
      3. Sales-Marketing Alignment: Implemented a HubSpot-powered revenue 
      operations stack with lead scoring, automated nurturing, and closed-loop 
      reporting. Established shared KPIs and weekly alignment meetings.
    results:
      - metric: "12:1"
        label: "Overall ROAS"
      - metric: "60%"
        label: "Sales cycle reduction"
      - metric: "340%"
        label: "Qualified lead increase"
      - metric: "92%"
        label: "Lead-to-opportunity conversion"
      - metric: "45%"
        label: "Customer acquisition cost decrease"
    image: "/assets/images/case-studies/novatech-hero.jpg"
    testimonial: "What sets Apex apart is their obsession with data. Every recommendation is backed by evidence."
    testimonial_author: "Robert Klein, Director of Growth"
    results_image: "/assets/images/case-studies/novatech-results.jpg"
