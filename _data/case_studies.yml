case_studies:
  - id: "lumina-health-digital-transformation"
    client: "Lumina Health"
    industry: "Health & Wellness"
    service: "Growth Strategy + Digital Marketing"
    title: "How We Helped Lumina Health Achieve 340% ROI in 12 Months"
    short_description: "A comprehensive digital transformation that tripled revenue and established market leadership."
    challenge: >
      Lumina Health was a well-funded Series B healthtech company with an 
      exceptional product but struggled to find product-market fit. Their 
      customer acquisition costs were unsustainable ($850+ per customer), 
      their brand was virtually unknown outside their home city, and their 
      conversion funnel had critical drop-offs at every stage.
    solution: >
      We deployed our GrowthOS framework across three workstreams:
      
      1. Brand Transformation: Repositioned Lumina from "healthtech tool" 
      to "wellness revolution" — complete with new visual identity, messaging 
      architecture, and brand guidelines.
      
      2. Digital Experience: Rebuilt their website with a conversion-optimized 
      architecture, achieving sub-2 second load times and a 92% accessibility 
      score. Implemented personalized content journeys based on user behavior.
      
      3. Performance Marketing: Overhauled their paid media strategy with 
      AI-powered bidding, creative testing at scale, and full-funnel attribution. 
      Launched a content marketing program targeting 50+ high-intent keywords.
    results:
      - metric: "340%"
        label: "ROI within 12 months"
      - metric: "72%"
        label: "Customer acquisition cost reduction"
      - metric: "5.2x"
        label: "Increase in organic traffic"
      - metric: "3x"
        label: "Conversion rate improvement"
      - metric: "185%"
        label: "Lead generation growth"
    image: "/assets/images/case-studies/lumina-hero.jpg"
    testimonial: >
      "Apex didn't just grow our revenue — they transformed how we think about 
      growth altogether. Their GrowthOS framework gave us a playbook that we 
      still use daily."
    testimonial_author: "Sarah Mitchell, CEO"
    results_image: "/assets/images/case-studies/lumina-results.jpg"
    tags: ["growth-strategy", "digital-marketing", "web-development"]
    featured: true
    order: 1

