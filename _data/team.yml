  - name: "Marcus Williams"
    role: "Chief Technology Officer"
    bio: >
      Marcus is a former AWS Principal Engineer who now leads our technology 
      practice. He's architected systems processing 10B+ daily requests and 
      holds 12 patents in distributed computing. Under his leadership, our 
      engineering team has delivered 200+ high-performance digital platforms.
    photo: "/assets/images/team/marcus-williams.jpg"
    social:
      linkedin: "https://linkedin.com/in/marcuswilliams"
      github: "https://github.com/marcuswilliams"
