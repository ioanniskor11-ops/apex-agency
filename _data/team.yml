  - name: "Sofia Rodriguez"
    role: "Chief Strategy Officer"
    bio: >
      Sofia previously led growth at three Series B startups (two successful 
      exits) and was VP of Strategy at Ogilvy. She specializes in go-to-market 
      strategy for technical B2B brands and has a PhD in Behavioral Economics 
      from Stanford.
    photo: "/assets/images/team/sofia-rodriguez.jpg"
    social:
      linkedin: "https://linkedin.com/in/sofiarodriguez"
