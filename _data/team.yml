  - name: "James O'Brien"
    role: "VP, Digital Marketing"
    bio: >
      James has managed $200M+ in annual ad spend across Google, Meta, 
      LinkedIn, and TikTok. His proprietary bidding algorithms have consistently 
      outperformed market benchmarks by 40%+. He's a Google Ads Hall of Fame 
      inductee.
    photo: "/assets/images/team/james-obrien.jpg"
