values:
  - title: "Radical Transparency"
    description: "We share everything — our data, our process, our results. No smoke, no mirrors, no surprises."
    icon: "eye"

  - title: "Obsessive Craft"
    description: "Every pixel, every word, every interaction matters. We don't do 'good enough.'"
    icon: "gem"

  - title: "Audacious Thinking"
    description: "We dream in moonshots and reverse-engineer the path to get there. Safe is not in our vocabulary."
    icon: "rocket"

  - title: "Empathetic Partnership"
    description: "We listen before we advise. Your brand's success is our success. We're in this together."
    icon: "handshake"

  - title: "Continuous Evolution"
    description: "The moment we stop learning is the moment we stop leading. We're students of the craft, always."
    icon: "sync"

  - title: "Impact Over Ego"
    description: "The best idea wins — regardless of who it comes from. Results speak louder than titles."
    icon: "bullseye"

