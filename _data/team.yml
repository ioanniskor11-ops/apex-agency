# ── Team Members ──────────────────────────────────────────
team:
  - name: "Alexander Sterling"
    role: "Founder & Chief Growth Officer"
    bio: > 
      Alexander founded Apex Agency in 2015 with a mission to democratize 
      Fortune 500-grade growth strategies for ambitious brands. A former 
      McKinsey consultant and Google product lead, he's helped 15+ unicorns 
      scale to $1B+ valuations. He's a frequent keynote speaker at Web Summit, 
      Cannes Lions, and SXSW.
    photo: "/assets/images/team/alex-sterling.jpg"
    social:
      linkedin: "https://linkedin.com/in/alexsterling"
      twitter: "https://twitter.com/alexsterling"
    expertise:
      - "Growth Strategy"
      - "M&A Advisory"
      - "Board Leadership"
    fun_fact: "Climbed Mount Kilimanjaro barefoot for charity."
    order: 1

  - name: "Victoria Chen"
    role: "Chief Creative Officer"
    bio: >
      Victoria brings 18 years of creative leadership from agencies including 
      Wieden+Kennedy and Droga5. Her work has earned 7 Cannes Lions, 4 D&AD 
      Pencils, and a One Show Best of Show. She believes the best creative 
      is built on a foundation of rigorous strategy.
    photo: "/assets/images/team/victoria-chen.jpg"
    social:
      linkedin: "https://linkedin.com/in/victoriachen"
      instagram: "https://instagram.com/victoriachen"
    expertise:
