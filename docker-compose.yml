# ── Apex Agency — Docker Compose ────────────────────────────
version: '3.8'

services:
  # ── PostgreSQL Database ────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: apex-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: apex_agency
      POSTGRES_USER: apex_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme_dev_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./_src/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apex_user -d apex_agency"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - apex-network

  # ── Redis Cache ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: apex-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - apex-network

  # ── Backend API ─────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: apex-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DB_URL: postgresql://apex_user:${DB_PASSWORD:-changeme_dev_password}@postgres:5432/apex_agency
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_please_change_in_production}
      HCAPTCHA_SECRET: ${HCAPTCHA_SECRET:-0x0000000000000000000000000000000000000000}
      HCAPTCHA_ENABLED: "false"
      SMTP_HOST: ${SMTP_HOST:-mailhog}
      SMTP_PORT: "1025"
      SMTP_USER: ""
      SMTP_PASS: ""
      APP_URL: http://localhost:3000
    ports:
      - "3000:3000"
    volumes:
      - ./_src:/app/_src:ro
      - ./_data:/app/_data:ro
    networks:
      - apex-network

  # ── MailHog (dev email catcher) ─────────────────────────
  mailhog:
    image: mailhog/mailhog:latest
    container_name: apex-mailhog
    restart: unless-stopped
    ports:
      - "8025:8025"  # Web UI
      - "1025:1025"  # SMTP
    networks:
      - apex-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  apex-network:
    driver: bridge
